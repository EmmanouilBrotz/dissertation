<agent_config>
  <!-- File Integrity Monitoring -->
  <syscheck>
    <!-- Frequency of scans (every 12 hours = 43200 seconds) -->
    <frequency>43200</frequency>

    <!-- Real-time monitoring (immediate alerts on changes) -->
    <disabled>no</disabled>

    <!-- Monitor system authentication files -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/passwd</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/shadow</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/group</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/sudoers</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes" recursion_level="1">/etc/sudoers.d</directories>

    <!-- Monitor SSH configuration -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/ssh/sshd_config</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes" recursion_level="2">/root/.ssh</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes" recursion_level="2">/home/*/.ssh</directories>

    <!-- Monitor system binaries (detect rootkits) -->
    <directories check_all="yes" realtime="yes">/bin</directories>
    <directories check_all="yes" realtime="yes">/sbin</directories>
    <directories check_all="yes" realtime="yes">/usr/bin</directories>
    <directories check_all="yes" realtime="yes">/usr/sbin</directories>
<!-- Monitor cron jobs -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/cron.d</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/cron.daily</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/cron.hourly</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/cron.weekly</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/crontab</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes" recursion_level="2">/var/spool/cron</directories>

    <!-- Monitor web directories (if you have a web server) -->
    <!-- Uncomment if you have Apache/Nginx installed -->
    <!-- <directories check_all="yes" realtime="yes" report_changes="yes" recursion_level="5">/var/www/html</directories> -->

<!-- Monitor suspicious directories for malware -->
    <directories check_all="yes" realtime="yes">/tmp</directories>
    <directories check_all="yes" realtime="yes">/dev/shm</directories>

    <!-- Monitor systemd services -->

    <!-- Monitor systemd services -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/systemd/system</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/lib/systemd/system</directories>

    <!-- Ignore frequently changing files to reduce noise -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/prelink.cache</ignore>

    <!-- Alert on new files in monitored directories -->
    <alert_new_files>yes</alert_new_files>

    <!-- Auto-ignore files that change too frequently -->
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>
  </syscheck>
</agent_config>
